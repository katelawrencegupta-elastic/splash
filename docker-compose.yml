services:
  classify:
    build: ./sidecar
    container_name: splash-classify
    environment:
      ELASTIC_HOST: "${ELASTIC_HOST:?ELASTIC_HOST is required}"
      ELASTIC_API_KEY: "${ELASTIC_API_KEY:?ELASTIC_API_KEY is required}"
      DATA_STREAM_NAMESPACE: "${DATA_STREAM_NAMESPACE:-default}"
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  logstash:
    build: ./logstash
    container_name: splash-logstash
    ports:
      - "39997:39997"
    expose:
      - "39996"
    environment:
      ELASTIC_HOST: "${ELASTIC_HOST:?ELASTIC_HOST is required}"
      ELASTIC_API_KEY: "${ELASTIC_API_KEY:?ELASTIC_API_KEY is required}"
      CLASSIFY_URL: "http://classify:8080"
      CLASSIFY_BATCH_SIZE: "${CLASSIFY_BATCH_SIZE:-100}"
      CLASSIFY_FLUSH_MS: "${CLASSIFY_FLUSH_MS:-200}"
      CLASSIFY_MAX_BUFFER: "${CLASSIFY_MAX_BUFFER:-5000}"
      CLASSIFY_MAX_EGRESS: "${CLASSIFY_MAX_EGRESS:-5000}"
      CLASSIFY_MESSAGE_PREFIX_BYTES: "${CLASSIFY_MESSAGE_PREFIX_BYTES:-512}"
      # 512m is tight under batch classify + ES bulk; override via LS_JAVA_OPTS if needed.
      LS_JAVA_OPTS: "${LS_JAVA_OPTS:--Xms1g -Xmx1g}"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/scripts:/usr/share/logstash/scripts:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    depends_on:
      classify:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9600/_node/stats >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

  # Owns cooked S2S on 39998 (mutually exclusive with logstash-input-s2s).
  s2s-decode:
    build: ./s2s
    container_name: splash-s2s-decode
    ports:
      - "39998:39998"
    expose:
      - "8081"
    environment:
      S2S_LISTEN_HOST: "0.0.0.0"
      S2S_LISTEN_PORT: "39998"
      LOGSTASH_HOST: "logstash"
      LOGSTASH_DECODED_PORT: "39996"
      S2S_HEALTH_PORT: "8081"
      S2S_UPSTREAM_QUEUE_SIZE: "${S2S_UPSTREAM_QUEUE_SIZE:-10000}"
      S2S_UPSTREAM_BATCH_SIZE: "${S2S_UPSTREAM_BATCH_SIZE:-100}"
      S2S_UPSTREAM_FLUSH_MS: "${S2S_UPSTREAM_FLUSH_MS:-50}"
      S2S_UPSTREAM_DRAIN_TIMEOUT_S: "${S2S_UPSTREAM_DRAIN_TIMEOUT_S:-30}"
      LOG_LEVEL: "INFO"
    depends_on:
      logstash:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
