# Forward Splunk traffic to Logstash / S2S decoder.
# Place under $SPLUNK_HOME/etc/system/local/

[tcpout]
defaultGroup = logstash_cooked
# Prefer classic cooked framing so third-party terminators can decode reliably.
enableOldS2SProtocol = true

# Plain (uncooked) raw lines -> Logstash TCP 39997
[tcpout:logstash_uncooked]
server = logstash:39997
sendCookedData = false

# Cooked S2S binary -> s2s-decode TCP 39998 (decoded to Logstash 39996)
[tcpout:logstash_cooked]
server = s2s-decode:39998
sendCookedData = true
compressed = false
negotiateProtocolLevel = 0
