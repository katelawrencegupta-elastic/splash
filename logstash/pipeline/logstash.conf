input {
  tcp {
    port => 39997
    codec => plain
    tags => ["splunk_tcp_39997"]
  }
  # Decoded cooked S2S from s2s-decode (NDJSON)
  tcp {
    port => 39996
    codec => json_lines
    tags => ["s2s_decoded", "splunk_tcp_39998"]
  }
  # Wake the classify ruby filter on flush_ms boundaries while the pipeline is idle
  exec {
    command => "echo __classify_tick__"
    interval => 1
    tags => ["_classify_tick"]
  }
}

filter {
  # If the line is JSON (test clients / cooked payloads), parse it in place
  if "s2s_decoded" not in [tags] and "_classify_tick" not in [tags] and [message] =~ /^\s*\{/ {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # Normalize common Splunk / raw field shapes for the classify sidecar
  if "_classify_tick" not in [tags] {
    if [message] == "" or ![message] {
      if [_raw] {
        mutate { rename => { "_raw" => "message" } }
      } else if [event] and [event][original] {
        mutate { copy => { "[event][original]" => "message" } }
      }
    }

    if ![splunk_index] {
      if [splunk] and [splunk][index] {
        mutate { copy => { "[splunk][index]" => "splunk_index" } }
      } else if [index] {
        mutate { copy => { "index" => "splunk_index" } }
      } else {
        mutate { add_field => { "splunk_index" => "" } }
      }
    }

    if ![sourcetype] {
      mutate { add_field => { "sourcetype" => "" } }
    }
    if ![source] {
      mutate { add_field => { "source" => "" } }
    }
    if ![message] {
      mutate { add_field => { "message" => "" } }
    }

    # sourcetype:: / source:: are stripped in classify.py (once).
    # host:: is only relevant on the event host field for uncooked TCP.
    mutate {
      gsub => ["host", "^host::", ""]
    }
  }

  # Buffer events; flush at CLASSIFY_BATCH_SIZE or CLASSIFY_FLUSH_MS via /classify/batch
  ruby {
    path => "/usr/share/logstash/scripts/classify_batch.rb"
    periodic_flush => true
    script_params => {
      "classify_url" => "${CLASSIFY_URL}"
      "batch_size" => "${CLASSIFY_BATCH_SIZE:100}"
      "flush_ms" => "${CLASSIFY_FLUSH_MS:200}"
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTIC_HOST}"]
    api_key => "${ELASTIC_API_KEY}"
    ssl_enabled => true
    index => "%{[@metadata][target_stream]}"
    action => "create"
    manage_template => false
  }
}
